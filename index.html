    <style>
      :root {
        color-scheme: light;
        --ink: #1f2523;
        --muted: #68716d;
        --line: #d9ddd8;
        --surface: #ffffff;
        --wash: #f6f3ef;
        --accent: #b65f72;
        --accent-dark: #7b3144;
        --shadow: 0 18px 55px rgba(31, 37, 35, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(182, 95, 114, 0.14), transparent 34%),
          linear-gradient(315deg, rgba(99, 136, 120, 0.18), transparent 32%),
          var(--wash);
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0;
      }

      .location-shell {
        display: grid;
        grid-template-columns: minmax(280px, 0.82fr) minmax(320px, 1.18fr);
        min-height: calc(100vh - 84px);
        overflow: hidden;
        border: 1px solid rgba(31, 37, 35, 0.11);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .details {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 28px;
        padding: clamp(28px, 6vw, 64px);
      }

      .brand {
        margin: 0;
        font-size: clamp(2.5rem, 7vw, 5.4rem);
        line-height: 0.9;
        letter-spacing: 0;
        color: var(--accent-dark);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .address {
        margin: 0;
        max-width: 26rem;
        font-size: clamp(1.05rem, 2vw, 1.35rem);
        line-height: 1.55;
      }

      .website {
        display: inline-flex;
        width: fit-content;
        color: var(--accent-dark);
        font-size: 1rem;
        font-weight: 800;
        text-decoration: none;
        border-bottom: 2px solid rgba(123, 49, 68, 0.28);
      }

      .website:hover,
      .website:focus-visible {
        border-color: currentColor;
      }

      .contact-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .contact-list a {
        color: var(--ink);
        font-size: 1rem;
        font-weight: 750;
        text-decoration: none;
      }

      .contact-list a:hover,
      .contact-list a:focus-visible {
        color: var(--accent-dark);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid var(--accent-dark);
        border-radius: 6px;
        color: var(--accent-dark);
        font-weight: 700;
        text-decoration: none;
        transition: transform 160ms ease, background 160ms ease, color 160ms ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        background: var(--accent-dark);
        color: #fff;
      }

      .button.primary {
        background: var(--accent-dark);
        color: #fff;
      }

      .button.primary:hover,
      .button.primary:focus-visible {
        background: #5f2635;
      }

      .map-panel {
        min-height: 560px;
        border-left: 1px solid var(--line);
        background: #e8ece7;
      }

      .map-panel iframe {
        display: block;
        width: 100%;
        height: 100%;
        min-height: inherit;
        border: 0;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 20px, 640px);
          padding: 10px 0;
        }

        .location-shell {
          grid-template-columns: 1fr;
          min-height: auto;
        }

        .details {
          min-height: 44vh;
          padding: 32px 24px;
        }

        .map-panel {
          min-height: 420px;
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        .button {
          flex: 1 1 180px;
        }
      }
    </style>
  </head>
